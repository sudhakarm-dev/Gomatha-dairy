<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
}

/* Container */
.product-container {
  display: flex;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch; /* smooth on iOS */
}

/* Hide scrollbar (optional) */
.product-container::-webkit-scrollbar {
  display: none;
}

/* Each card */
.product-container div {
  min-width: 100%;
  height: 300px;
  scroll-snap-align: start;
  flex-shrink: 0;
}

/* Just for demo colors */
.product-one { background: red; }
.product-two { background: blue; }
.product-three { background: green; }
.product-four { background: orange; }
</style>
</head>

<body>
<div class="product-container">
    <div class="product-one"></div>
    <div class="product-two"></div>
    <div class="product-three"></div>
    <div class="product-four"></div>
</div>
</body>
</html>
